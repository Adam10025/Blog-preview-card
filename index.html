<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Blog preview card</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <article class="card">
      <div class="card-image">
        <img src="./assets/images/illustration-article.svg" alt="Abstract illustration representing HTML and CSS code">
      </div>

      <div class="card-content-container">
        <div class="card-content">
          <p class="card-badge">Learning</p>
          <p class="card-date">Published 21 Dec 2023</p>
          <h1 class="card-title">
            <a class="card-title-link" href="#">HTML &amp; CSS foundations</a>
          </h1>
          <p class="card-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
        </div>

        <div class="profile-container">
          <div class="profile-info">
            <div class="profile-image">
              <img src="./assets/images/image-avatar.webp" alt="Portrait of Greg Hooper">
            </div>
            <p class="profile-name">Greg Hooper</p>
          </div>
        </div>
      </div>
    </article>
  </main>

</body>
</html>
